<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@300;400;600;700&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: var(--viewport-width);
			height: var(--viewport-height);
			overflow: hidden;
			background: transparent;
			font-family: 'Montserrat', sans-serif;
		}

		.wrap {
			width: 100%;
			height: 100%;
			position: relative;
		}

		/* Lifestyle: Left-leaning atmospheric gradient */
		.grad {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(160deg,
					rgba(0, 0, 0, 0.65) 0%,
					rgba(0, 0, 0, 0.0) 45%,
					rgba(0, 0, 0, 0.0) 60%,
					rgba(0, 0, 0, 0.75) 100%);
		}

		.grad-bottom {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			height: 45%;
			background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.9));
		}

		.grad-top {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 22%;
			background: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent);
		}

		.layer {
			position: absolute;
			inset: 0;
		}

		/* ── Top left block ── */
		.top-left {
			position: absolute;
			top: clamp(14px, 3vw, 40px);
			left: clamp(16px, 4vw, 50px);
		}

		.brand-name {
			font-size: clamp(9px, 1.2vw, 16px);
			font-weight: 700;
			letter-spacing: 4px;
			color: rgba(255, 255, 255, 0.9);
			text-transform: uppercase;
		}

		.category-tag {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 300;
			letter-spacing: 2px;
			color: rgba(255, 255, 255, 0.5);
			margin-top: 4px;
		}

		/* ── Main editorial left block ── */
		.main-block {
			position: absolute;
			bottom: clamp(80px, 14vh, 160px);
			left: clamp(16px, 4vw, 50px);
			max-width: 60%;
		}

		.overline {
			font-size: clamp(7px, 1vw, 13px);
			font-weight: 700;
			letter-spacing: 4px;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.55);
			margin-bottom: clamp(8px, 1.5vh, 16px);
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.overline::before {
			content: '';
			display: block;
			width: clamp(18px, 2.5vw, 32px);
			height: 1px;
			background: rgba(255, 255, 255, 0.4);
		}

		.headline {
			font-family: 'Playfair Display', serif;
			font-size: clamp(28px, 6.5vw, 92px);
			font-weight: 700;
			line-height: 1.05;
			color: #fff;
			margin-bottom: clamp(10px, 2vh, 22px);
			text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
		}

		.desc {
			font-family: 'Cormorant Garamond', serif;
			font-size: clamp(13px, 1.8vw, 24px);
			font-weight: 300;
			font-style: italic;
			line-height: 1.6;
			color: rgba(255, 255, 255, 0.78);
			margin-bottom: clamp(14px, 2.5vh, 28px);
		}

		.cta {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			font-size: clamp(9px, 1.1vw, 14px);
			font-weight: 700;
			letter-spacing: 3px;
			text-transform: uppercase;
			color: #fff;
			border-bottom: 1px solid rgba(255, 255, 255, 0.4);
			padding-bottom: 4px;
		}

		.cta-arrow {
			font-size: 1.2em;
		}

		/* ── Bottom price strip ── */
		.price-strip {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			background: rgba(255, 255, 255, 0.06);
			backdrop-filter: blur(20px);
			border-top: 1px solid rgba(255, 255, 255, 0.1);
			padding: clamp(10px, 2vh, 22px) clamp(16px, 4vw, 50px);
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.ps-label {
			font-size: clamp(7px, 0.9vw, 12px);
			letter-spacing: 2px;
			color: rgba(255, 255, 255, 0.4);
			text-transform: uppercase;
			font-weight: 600;
		}

		.ps-price {
			font-family: 'Playfair Display', serif;
			font-size: clamp(16px, 2.8vw, 40px);
			font-weight: 700;
			color: #fff;
		}

		.ps-includes {
			font-size: clamp(8px, 1.1vw, 14px);
			color: rgba(255, 255, 255, 0.55);
			letter-spacing: 1px;
		}

		.ps-book {
			background: #fff;
			color: #111;
			font-size: clamp(9px, 1.1vw, 14px);
			font-weight: 700;
			letter-spacing: 2px;
			text-transform: uppercase;
			padding: clamp(8px, 1.4vh, 16px) clamp(16px, 2.5vw, 30px);
			border-radius: 4px;
			white-space: nowrap;
		}

		/* ── Landscape Optimizations (1.91:1) ── */
		@media (min-aspect-ratio: 1.2/1) {
			.main-block {
				bottom: clamp(60px, 12vh, 100px);
				max-width: 50%;
			}
			.headline {
				font-size: clamp(24px, 5.5vw, 70px);
			}
			.desc {
				font-size: clamp(11px, 1.5vw, 20px);
				margin-bottom: clamp(10px, 2vh, 20px);
			}
			.price-strip {
				padding: clamp(8px, 1.5vh, 16px) clamp(16px, 4vw, 50px);
			}
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="grad"></div>
		<div class="grad-bottom"></div>
		<div class="grad-top"></div>
		<div class="layer">
			<div class="top-left">
				<div class="brand-name">{{brand_name}}</div>
				<div class="category-tag">{{category}}</div>
			</div>

			<div class="main-block">
				<div class="overline">{{overline}}</div>
				<div class="headline">{{headline}}</div>
				<div class="desc">{{description}}</div>
				<div class="cta">Discover More <span class="cta-arrow">→</span></div>
			</div>

			<div class="price-strip">
				<div>
					<div class="ps-label">Starting From</div>
					<div class="ps-price">{{price}}</div>
				</div>
				<div class="ps-includes">{{includes}}</div>
				<div class="ps-book">Book Now</div>
			</div>
		</div>
	</div>
</body>

</html>
