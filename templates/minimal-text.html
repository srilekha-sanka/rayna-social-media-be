<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		width: var(--viewport-width);
		height: var(--viewport-height);
		overflow: hidden;
		font-family: 'Montserrat', Arial, sans-serif;
		background: transparent;
	}
	.container {
		width: 100%;
		height: 100%;
		display: flex;
		flex-direction: column;
		justify-content: flex-end;
		align-items: center;
		padding: 8%;
		position: relative;
	}
	.gradient-overlay {
		position: absolute;
		bottom: 0;
		left: 0;
		right: 0;
		height: 45%;
		background: linear-gradient(
			to bottom,
			rgba(0,0,0,0) 0%,
			rgba(0,0,0,0.45) 50%,
			rgba(0,0,0,0.75) 100%
		);
	}
	.title {
		position: relative;
		z-index: 1;
		font-size: 4.5vh;
		font-weight: 800;
		color: #FFFFFF;
		text-align: center;
		letter-spacing: 0.5px;
		line-height: 1.15;
	}
</style>
</head>
<body>
	<div class="container">
		<div class="gradient-overlay"></div>
		<div class="title">{{title}}</div>
	</div>
</body>
</html>
