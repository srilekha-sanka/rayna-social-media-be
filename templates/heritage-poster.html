<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: var(--viewport-width);
			height: var(--viewport-height);
			overflow: hidden;
			background: transparent;
			font-family: 'Montserrat', sans-serif;
		}

		.wrap {
			width: 100%;
			height: 100%;
			position: relative;
		}

		/* Heritage cinematic dark gradient */
		.grad {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(180deg,
					rgba(0, 0, 0, 0.6) 0%,
					rgba(0, 0, 0, 0.05) 30%,
					rgba(0, 0, 0, 0) 50%,
					rgba(8, 5, 0, 0.8) 75%,
					rgba(8, 5, 0, 0.98) 100%);
		}

		.grad-vignette {
			position: absolute;
			inset: 0;
			box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.7);
		}

		.layer {
			position: absolute;
			inset: 0;
		}

		/* ── Decorative top gold line ── */
		.top-line {
			position: absolute;
			top: clamp(12px, 2.5vw, 32px);
			left: clamp(16px, 4vw, 50px);
			right: clamp(16px, 4vw, 50px);
			height: 1px;
			background: linear-gradient(90deg, transparent, rgba(212, 176, 120, 0.7), rgba(212, 176, 120, 0.4), transparent);
		}

		.top-brand {
			position: absolute;
			top: clamp(18px, 3.5vw, 45px);
			left: 50%;
			transform: translateX(-50%);
			font-size: clamp(7px, 1vw, 13px);
			font-weight: 700;
			letter-spacing: 5px;
			color: rgba(212, 176, 120, 0.8);
			text-transform: uppercase;
			white-space: nowrap;
		}

		/* ── Massive central script ── */
		.hero-block {
			position: absolute;
			top: 50%;
			left: 0;
			right: 0;
			transform: translateY(-55%);
			text-align: center;
			padding: 0 6%;
		}

		.script-big {
			font-family: 'Dancing Script', cursive;
			font-size: clamp(60px, 14vw, 180px);
			font-weight: 700;
			color: #fff;
			line-height: 0.9;
			letter-spacing: -2px;
			text-shadow: 0 10px 40px rgba(0,0,0,0.6);
		}

		.ornament {
			margin: clamp(6px, 1.2vh, 14px) auto;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: clamp(8px, 1.5vw, 20px);
		}

		.orn-line {
			flex: 1;
			height: 1px;
			background: linear-gradient(90deg, transparent, rgba(212, 176, 120, 0.6));
			max-width: 25%;
		}

		.orn-line.r {
			background: linear-gradient(90deg, rgba(212, 176, 120, 0.6), transparent);
		}

		.orn-diamond {
			width: clamp(6px, 0.8vw, 10px);
			height: clamp(6px, 0.8vw, 10px);
			background: #D4A85C;
			transform: rotate(45deg);
		}

		.sub-serif {
			font-family: 'Cormorant Garamond', serif;
			font-size: clamp(12px, 2vw, 28px);
			font-weight: 300;
			font-style: italic;
			color: rgba(255, 255, 255, 0.85);
			text-shadow: 0 1px 2px rgba(0,0,0,0.5);
			letter-spacing: 2px;
		}

		/* ── Bottom info: left includes, right price ── */
		.bottom-panel {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			padding: clamp(14px, 3vh, 36px) clamp(20px, 5vw, 60px);
			display: flex;
			align-items: flex-end;
			justify-content: space-between;
			gap: 4vw;
		}

		.bot-left {
			flex: 1;
		}

		.inc-heading {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 700;
			letter-spacing: 4px;
			color: #D4A85C;
			text-transform: uppercase;
			margin-bottom: clamp(4px, 0.8vh, 8px);
		}

		.inc-list {
			font-size: clamp(9px, 1.2vw, 16px);
			font-weight: 300;
			color: #fff;
			letter-spacing: 1.5px;
			line-height: 1.6;
			text-shadow: 0 1px 2px rgba(0,0,0,0.5);
		}

		/* Gold vertical divider */
		.vert-div {
			width: 1px;
			height: clamp(40px, 8vh, 90px);
			background: linear-gradient(180deg, transparent, #D4A85C, transparent);
			flex-shrink: 0;
		}

		.bot-right {
			text-align: right;
			flex: 1;
		}

		.price-label {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 600;
			letter-spacing: 3px;
			color: rgba(255, 255, 255, 0.85);
			text-transform: uppercase;
			margin-bottom: clamp(4px, 0.8vh, 8px);
			text-shadow: 0 1px 2px rgba(0,0,0,0.5);
		}

		.price-big {
			font-family: 'Playfair Display', serif;
			font-size: clamp(20px, 4vw, 55px);
			font-weight: 700;
			color: #D4A85C;
			letter-spacing: 1px;
			text-shadow: 0 2px 5px rgba(0,0,0,0.4);
		}

		.dates-small {
			font-size: clamp(8px, 1vw, 13px);
			font-weight: 400;
			color: #fff;
			letter-spacing: 2px;
			margin-top: clamp(4px, 0.5vh, 6px);
			text-shadow: 0 1px 2px rgba(0,0,0,0.5);
		}

		/* Bottom gold hairline */
		.bottom-line {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			height: 3px;
			background: linear-gradient(90deg, transparent, #D4A85C 30%, #D4A85C 70%, transparent);
		}

		/* ── Landscape Optimizations (1.91:1) ── */
		@media (min-aspect-ratio: 1.2/1) {
			.hero-block {
				transform: translateY(-60%);
				padding: 0 10%;
			}
			.script-big {
				font-size: clamp(40px, 10vw, 110px);
			}
			.sub-serif {
				font-size: clamp(10px, 1.8vw, 22px);
			}
			.bottom-panel {
				padding: clamp(10px, 2vh, 20px) clamp(20px, 5vw, 60px);
			}
			.vert-div {
				height: clamp(30px, 6vh, 60px);
			}
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="grad"></div>
		<div class="grad-vignette"></div>
		<div class="layer">
			<div class="top-line"></div>
			<div class="top-brand">{{brand_name}}</div>

			<div class="hero-block">
				<div class="script-big">{{headline}}</div>
				<div class="ornament">
					<div class="orn-line"></div>
					<div class="orn-diamond"></div>
					<div class="orn-line r"></div>
				</div>
				<div class="sub-serif">{{subheadline}}</div>
			</div>

			<div class="bottom-panel">
				<div class="bot-left">
					<div class="inc-heading">Includes</div>
					<div class="inc-list">{{includes}}</div>
				</div>
				<div class="vert-div"></div>
				<div class="bot-right">
					<div class="price-label">Starting From</div>
					<div class="price-big">{{price}}</div>
					<div class="dates-small">{{dates}}</div>
				</div>
			</div>
			<div class="bottom-line"></div>
		</div>
	</div>
</body>

</html>
