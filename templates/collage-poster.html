<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Playfair+Display:wght@700;800&family=Cormorant+Garamond:ital,wght@1,400&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #F97316;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            width: var(--viewport-width);
            height: var(--viewport-height);
            overflow: hidden;
            background: transparent;
            font-family: 'Outfit', sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Ambient Overlays */
        .overlay-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, transparent 40%, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 1;
        }

        /* Polaroid Collage System */
        .collage {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .photo-frame {
            position: absolute;
            background: #fff;
            padding: clamp(12px, 2vw, 24px);
            padding-bottom: clamp(40px, 6vw, 80px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0,0,0,0.05);
            border-radius: 2px;
            z-index: 5;
            transition: all 0.5s ease;
        }

        /* Tape effect */
        .photo-frame::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(2deg);
            width: 80px;
            height: 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Specific Frames - dynamic positioning */
        .frame-1 {
            width: 45%;
            height: 32%;
            top: 8%;
            right: 18%;
            transform: rotate(-4deg);
            z-index: 12;
        }

        .frame-2 {
            width: 52%;
            height: 38%;
            top: 36%;
            right: 8%;
            transform: rotate(3deg);
            z-index: 11;
        }

        .frame-3 {
            width: 48%;
            height: 35%;
            bottom: 6%;
            right: 15%;
            transform: rotate(-2deg);
            z-index: 13;
        }

        /* Left Content Block */
        .content-block {
            position: absolute;
            top: 0;
            left: 0;
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 clamp(30px, 6vw, 80px);
            z-index: 20;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
            color: #fff;
        }

        .brand-logo {
            position: absolute;
            top: clamp(30px, 4vh, 60px);
            left: clamp(30px, 6vw, 80px);
            font-weight: 800;
            font-size: clamp(16px, 1.8vw, 24px);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo::before {
            content: '';
            width: 8px;
            height: 24px;
            background: var(--accent);
            display: block;
        }

        .headline {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(60px, 12vw, 180px);
            font-weight: 700;
            line-height: 0.8;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .summary {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 2.2vw, 32px);
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            max-width: 90%;
            line-height: 1.4;
        }

        /* Price Badge */
        .price-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 40px;
        }

        .price-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 700;
        }

        .price-value {
            font-size: clamp(32px, 4vw, 56px);
            font-weight: 700;
        }

        /* Promo Block */
        .promo-pill {
            display: inline-flex;
            align-items: center;
            background: #fff;
            padding: 4px;
            border-radius: 6px;
            width: fit-content;
            margin-top: 10px;
        }

        .promo-label {
            background: #111;
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .promo-code {
            color: #111;
            padding: 0 20px;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* Bottom Details */
        .bottom-details {
            position: absolute;
            bottom: clamp(30px, 4vh, 60px);
            left: clamp(30px, 6vw, 80px);
            display: flex;
            gap: 30px;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.5);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        /* ── Landscape Optimizations (1.91:1) ── */
        @media (min-aspect-ratio: 1.2/1) {
            .content-block {
                width: 50%;
                padding: 0 40px;
            }
            .collage {
                width: 55%;
            }
            .headline {
                font-size: clamp(40px, 8vw, 100px);
            }
            .summary {
                font-size: clamp(14px, 1.8vw, 24px);
                margin-bottom: 20px;
            }
            .price-container {
                margin-bottom: 20px;
            }
            .frame-1 { top: 10%; right: 15%; width: 42%; height: 38%; }
            .frame-2 { top: 32%; right: 5%; width: 45%; height: 45%; }
            .frame-3 { bottom: 10%; right: 12%; width: 40%; height: 40%; }
            .bottom-details {
                bottom: 20px;
                left: 40px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="overlay-gradient"></div>

        <div class="brand-logo">{{brand_name}}</div>

        <div class="content-block">
            <div class="headline">{{headline}}</div>
            <div class="summary">{{subheadline}}</div>

            <div class="price-container">
                <div class="price-label">Starting From</div>
                <div class="price-value">{{price}}</div>
            </div>

            <div class="promo-pill">
                <div class="promo-label">USE CODE</div>
                <div class="promo-code">{{promo_code}}</div>
            </div>
        </div>

        <div class="collage">
            <div class="photo-frame frame-1">
                <img src="{{photo_1}}" alt="">
            </div>
            <div class="photo-frame frame-2">
                <img src="{{photo_2}}" alt="">
            </div>
            <div class="photo-frame frame-3">
                <img src="{{photo_3}}" alt="">
            </div>
        </div>

        <div class="bottom-details">
            <div class="detail-item">{{dates}}</div>
            <div class="dot"></div>
            <div class="detail-item">{{includes}}</div>
            <div class="dot"></div>
            <div class="detail-item" style="color: #fff; font-weight: 700;">{{contact}}</div>
        </div>
    </div>
</body>

</html>
