<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;600;700;900&family=Dancing+Script:wght@700&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: var(--viewport-width);
			height: var(--viewport-height);
			overflow: hidden;
			background: transparent;
			font-family: 'Montserrat', sans-serif;
		}

		.wrap {
			width: 100%;
			height: 100%;
			position: relative;
		}

		/* Cinematic multi-layer gradient */
		.grad {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(180deg,
					rgba(0, 0, 0, 0.55) 0%,
					rgba(0, 0, 0, 0) 30%,
					rgba(0, 0, 0, 0) 45%,
					rgba(0, 0, 0, 0.5) 65%,
					rgba(0, 0, 0, 0.92) 100%);
		}

		/* Left cinematic vignette */
		.grad-left {
			position: absolute;
			inset: 0;
			background: linear-gradient(90deg, rgba(0, 0, 0, 0.35) 0%, transparent 50%);
		}

		/* All text on top */
		.layer {
			position: absolute;
			inset: 0;
		}

		/* ── Top bar ── */
		.topbar {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			padding: clamp(14px, 3vw, 40px) clamp(16px, 4vw, 48px);
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.brand-pill {
			background: rgba(255, 255, 255, 0.12);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 100px;
			padding: clamp(4px, 0.8vw, 10px) clamp(10px, 2vw, 28px);
			font-size: clamp(8px, 1.1vw, 14px);
			font-weight: 700;
			letter-spacing: 3px;
			color: #fff;
			text-transform: uppercase;
		}

		.top-tag {
			font-size: clamp(8px, 1vw, 13px);
			color: rgba(255, 255, 255, 0.7);
			letter-spacing: 2px;
			text-transform: uppercase;
			font-weight: 300;
		}

		/* ── Hero text block ── */
		.hero {
			position: absolute;
			bottom: clamp(110px, 20vh, 220px);
			left: clamp(20px, 5vw, 60px);
			right: clamp(20px, 8vw, 100px);
		}

		.eyebrow {
			font-size: clamp(9px, 1.2vw, 15px);
			font-weight: 700;
			letter-spacing: 4px;
			text-transform: uppercase;
			color: #F5C842;
			margin-bottom: clamp(6px, 1.2vh, 14px);
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.eyebrow::before {
			content: '';
			display: block;
			width: clamp(20px, 3vw, 40px);
			height: 2px;
			background: #F5C842;
			flex-shrink: 0;
		}

		.headline {
			font-family: 'Playfair Display', serif;
			font-size: clamp(32px, 7vw, 100px);
			font-weight: 900;
			line-height: 1;
			color: #fff;
			text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
			margin-bottom: clamp(8px, 1.5vh, 18px);
		}

		.tagline {
			font-size: clamp(10px, 1.4vw, 18px);
			font-weight: 300;
			color: rgba(255, 255, 255, 0.82);
			letter-spacing: 1.5px;
			line-height: 1.5;
			max-width: 70%;
		}

		/* ── Bottom info strip ── */
		.strip {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			background: rgba(0, 0, 0, 0.65);
			backdrop-filter: blur(12px);
			border-top: 1px solid rgba(255, 255, 255, 0.08);
			padding: clamp(10px, 2vh, 22px) clamp(20px, 5vw, 60px);
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 2vw;
		}

		.strip-block {
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.strip-label {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 600;
			letter-spacing: 2.5px;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.4);
		}

		.strip-value {
			font-size: clamp(11px, 1.6vw, 20px);
			font-weight: 700;
			color: #fff;
			letter-spacing: 0.5px;
		}

		.strip-price .strip-value {
			color: #F5C842;
			font-size: clamp(13px, 2vw, 26px);
		}

		.strip-divider {
			width: 1px;
			align-self: stretch;
			background: rgba(255, 255, 255, 0.15);
			flex-shrink: 0;
		}

		.cta-btn {
			background: #F5C842;
			color: #1a1a1a;
			font-size: clamp(9px, 1.1vw, 14px);
			font-weight: 800;
			letter-spacing: 2px;
			text-transform: uppercase;
			padding: clamp(8px, 1.4vh, 16px) clamp(14px, 2.5vw, 32px);
			border-radius: 6px;
			white-space: nowrap;
			flex-shrink: 0;
		}

		/* ── Landscape Optimizations (1.91:1) ── */
		@media (min-aspect-ratio: 1.2/1) {
			.hero {
				bottom: clamp(60px, 12vh, 120px);
				max-width: 60%;
			}
			.headline {
				font-size: clamp(28px, 6vw, 80px);
			}
			.strip {
				padding: clamp(8px, 1.5vh, 16px) clamp(20px, 5vw, 60px);
			}
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="grad"></div>
		<div class="grad-left"></div>
		<div class="layer">
			<div class="topbar">
				<div class="brand-pill">{{brand_name}}</div>
				<div class="top-tag">Explore {{destination}}</div>
			</div>

			<div class="hero">
				<div class="eyebrow">{{eyebrow}}</div>
				<div class="headline">{{headline}}</div>
				<div class="tagline">{{tagline}}</div>
			</div>

			<div class="strip">
				<div class="strip-block">
					<div class="strip-label">Destination</div>
					<div class="strip-value">{{destination}}</div>
				</div>
				<div class="strip-divider"></div>
				<div class="strip-block strip-price">
					<div class="strip-label">Starting From</div>
					<div class="strip-value">{{price}}</div>
				</div>
				<div class="strip-divider"></div>
				<div class="strip-block">
					<div class="strip-label">Includes</div>
					<div class="strip-value"
						style="font-size: clamp(9px,1.2vw,15px); font-weight:400; color: rgba(255,255,255,0.8)">
						{{includes}}</div>
				</div>
				<div class="cta-btn">Book Now →</div>
			</div>
		</div>
	</div>
</body>

</html>
