<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		width: var(--viewport-width);
		height: var(--viewport-height);
		overflow: hidden;
		font-family: 'Montserrat', Arial, sans-serif;
		background: transparent;
	}

	.container {
		width: 100%;
		height: 100%;
		display: flex;
		flex-direction: column;
		align-items: center;
		position: relative;
	}

	/* -- Gradients -- */
	.top-vignette {
		position: absolute;
		top: 0; left: 0; right: 0;
		height: 15%;
		background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 100%);
	}
	.bottom-gradient {
		position: absolute;
		bottom: 0; left: 0; right: 0;
		height: 45%;
		background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.7) 100%);
	}

	/* -- Content -- */
	.content {
		position: relative;
		z-index: 1;
		width: 100%;
		height: 100%;
		display: flex;
		flex-direction: column;
		align-items: center;
		text-align: center;
	}

	.headline {
		margin-top: 22%;
		font-family: 'Great Vibes', 'Dancing Script', cursive;
		font-size: 7.5vh;
		color: #FFFFFF;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
		line-height: 1.1;
	}

	.price-section {
		position: absolute;
		top: 62%;
		text-align: center;
	}
	.price-label {
		font-size: 1.8vh;
		font-weight: 400;
		color: rgba(255,255,255,0.9);
		letter-spacing: 1.5px;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}
	.price {
		font-size: 4.5vh;
		font-weight: 700;
		color: #FFFFFF;
		letter-spacing: 1px;
		margin-top: 0.8vh;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}
	.includes-label {
		font-size: 1.8vh;
		font-weight: 600;
		color: rgba(255,255,255,0.9);
		letter-spacing: 1px;
		margin-top: 2vh;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}
	.includes {
		font-size: 1.7vh;
		font-weight: 400;
		color: rgba(255,255,255,0.85);
		letter-spacing: 0.5px;
		margin-top: 0.8vh;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}

	.footer {
		position: absolute;
		bottom: 8%;
		text-align: center;
	}
	.dates {
		font-size: 1.8vh;
		font-weight: 600;
		color: #FFFFFF;
		letter-spacing: 2px;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}
	.contact {
		font-size: 1.5vh;
		font-weight: 400;
		color: rgba(255,255,255,0.85);
		letter-spacing: 1px;
		margin-top: 0.8vh;
		text-shadow: 0 1px 3px rgba(0,0,0,0.5);
	}
</style>
</head>
<body>
	<div class="container">
		<div class="top-vignette"></div>
		<div class="bottom-gradient"></div>
		<div class="content">
			<div class="headline">{{headline}}</div>

			<div class="price-section">
				<div class="price-label">Starting From</div>
				<div class="price">{{price}}</div>
				<div class="includes-label">Includes</div>
				<div class="includes">{{includes}}</div>
			</div>

			<div class="footer">
				<div class="dates">{{dates}}</div>
				<div class="contact">{{contact}}</div>
			</div>
		</div>
	</div>
</body>
</html>
