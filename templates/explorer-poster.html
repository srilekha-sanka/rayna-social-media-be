<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }

	body {
		width: var(--viewport-width);
		height: var(--viewport-height);
		overflow: hidden;
		background: transparent;
	}

	.container {
		width: 100%;
		height: 100%;
		position: relative;
	}

	/* ── Bottom gradient ── */
	.bottom-gradient {
		position: absolute;
		bottom: 0; left: 0; right: 0;
		height: 32%;
		background: linear-gradient(
			to bottom,
			rgba(0,0,0,0) 0%,
			rgba(0,0,0,0.45) 45%,
			rgba(0,0,0,0.85) 100%
		);
	}

	.content {
		position: absolute;
		top: 0; left: 0; right: 0; bottom: 0;
	}

	/* ── "Explore" ── */
	.explore-label {
		position: absolute;
		top: 18%;
		width: 100%;
		text-align: center;
		font-family: 'Dancing Script', 'Great Vibes', cursive;
		font-size: 7vh;
		font-weight: 700;
		color: #F5E6D3;
		text-shadow: 2px 3px 6px rgba(0,0,0,0.7);
		line-height: 1;
	}

	/* ── Headline ── */
	.headline {
		position: absolute;
		top: 26%;
		width: 100%;
		text-align: center;
		padding: 0 4%;
		font-family: 'Playfair Display', Georgia, serif;
		font-size: var(--headline-font-size, 13vh);
		font-weight: 400;
		color: #F5E6D3;
		letter-spacing: 3px;
		text-transform: uppercase;
		line-height: 1;
		text-shadow: 3px 4px 6px rgba(0,0,0,0.75);
	}

	/* ── Sub-locations ── */
	.sub-locations {
		position: absolute;
		top: 43%;
		width: 100%;
		text-align: center;
		font-family: 'Montserrat', sans-serif;
		font-size: 1.6vh;
		font-weight: 600;
		color: rgba(255, 255, 255, 0.85);
		letter-spacing: 0.35em;
		text-transform: uppercase;
		text-shadow: 0 2px 6px rgba(0,0,0,0.5);
	}

	/* ──banner ── */
	.banner {
	position: absolute;
	bottom: 18%;
	left: 50%;
	transform: translateX(-50%);
	background: #E6BE8A;
	border-radius: 50px;
	padding: 1.6vh 4.5vh;
	box-shadow: 0 8px 24px rgba(0,0,0,0.35);
	white-space: nowrap;
}

.banner-text {
	font-family: 'Montserrat', sans-serif;
	font-size: 2vh;
	font-weight: 600;
	color: #2A2A2A;
	letter-spacing: 0.15em;
	text-transform: uppercase;
}

	/* ── Contact footer ── */
	.contact-footer {
		position: absolute;
		bottom: 3.5%;
		left: 6%;
		right: 6%;
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	.contact-item {
		font-family: 'Oswald', 'Montserrat', Arial, sans-serif;
		font-size: 1.6vh;
		font-weight: 700;
		color: #FFFFFF;
		letter-spacing: 1px;
		text-shadow: 2px 3px 6px rgba(0,0,0,0.8);
	}
</style>
</head>
<body>
	<div class="container">
		<div class="bottom-gradient"></div>
		<div class="content">
			<div class="explore-label">Explore</div>
			<div class="headline" style="--headline-font-size: {{headlineFontSize}}">{{headline}}</div>
			<div class="sub-locations">{{subheadline}}</div>

			<div class="banner">
				<div class="banner-text">{{bannerText}}</div>
			</div>

			<div class="contact-footer">
				<div class="contact-item">{{contactLeft}}</div>
				<div>
					<img src="{{logoUrl}}" alt="Brand Logo" style="height: 10vh;">
				</div>
				<div class="contact-item">{{contactRight}}</div>
			</div>
		</div>
	</div>
</body>
</html>
