<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }

	body {
		width: var(--viewport-width);
		height: var(--viewport-height);
		overflow: hidden;
		background: transparent;
	}

	.container {
		width: 100%;
		height: 100%;
		position: relative;
	}

	/* ── Gradients ── */
	.top-vignette {
		position: absolute;
		top: 0; left: 0; right: 0;
		height: 15%;
		background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
	}
	.bottom-gradient {
		position: absolute;
		bottom: 0; left: 0; right: 0;
		height: 55%;
		background: linear-gradient(
			to bottom,
			rgba(0,0,0,0) 0%,
			rgba(0,0,0,0.35) 20%,
			rgba(0,0,0,0.7) 45%,
			rgba(0,0,0,0.9) 70%,
			rgba(0,0,0,0.95) 100%
		);
	}

	.content {
		position: absolute;
		top: 0; left: 0; right: 0; bottom: 0;
	}

	/* ── Headline — heavy white brush script ── */
	.headline {
		position: absolute;
		top: 10%;
		width: 100%;
		text-align: center;
		padding: 0 4%;
		font-family: 'Playlist Script', cursive;
	    font-size: var(--headline-font-size, 14vh);
	    font-weight: 400;
	    color: #ffffff;
     	line-height: 0.9;
		-webkit-text-stroke: 1px rgba(255,255,255,0.6);
		text-shadow:
		   0 4px 10px rgba(0,0,0,0.9),
		   0 8px 25px rgba(0,0,0,0.7),
		   2px 2px 0 rgba(0,0,0,0.6);
		paint-order: stroke fill;
		transform: scaleY(1.05);
		letter-spacing: 1px;
	}

	/* ── Info block ── */
	.info-block {
		position: absolute;
		top: 58%;
		width: 100%;
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: 0;
	}

	.starting-line {
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 1vh;
	}
	.dash {
		width: 5vh;
		height: 1.5px;
		background: rgba(255,255,255,0.6);
	}
	.starting-text {
		font-family: 'Oswald', 'Montserrat', Arial, sans-serif;
		font-size: 2vh;
		font-weight: 700;
		color: rgba(255,255,255,0.9);
		letter-spacing: 3px;
	}

	.price-line {
		display: flex;
		align-items: baseline;
		justify-content: center;
		gap: 1vh;
		margin-top: -2.8vh;
	}
	.currency {
		font-family: 'Bebas Neue', 'Oswald', Arial, sans-serif;
		font-size: 7vh;
		font-weight: 400;
		color: #FFFFFF;
		letter-spacing: 3px;
		text-shadow: 2px 3px 6px rgba(0,0,0,0.7);
	}
	.amount {
		font-family: 'Playlist Script', cursive;
    	font-size: 11vh;
    	font-weight: 700;
    	color: #f4b223;
    	text-shadow:
	    	0px 2px 0px rgba(0,0,0,0.2),
    		2px 4px 10px rgba(0,0,0,0.5);
	    letter-spacing: 1px;
}

	.inc-header {
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 2vh;
		margin-top: -3vh;
		margin-bottom: 1vh;
	}
	.inc-dec-line {
		width: 12vh;
		height: 1px;
		background: rgba(233,164,21,0.5);
	}
	.inc-label {
		font-family: 'Kaushan Script', 'Dancing Script', cursive;
		font-size: 3.5vh;
		font-weight: 400;
		color: #E9A415;
		text-shadow: 1px 2px 4px rgba(0,0,0,0.7);
	}
	.inc-items {
		margin-top: 0.2vh;
		font-family: 'Montserrat', Arial, sans-serif;
		font-size: 2vh;
		font-weight: 700;
		color: #FFFFFF;
		letter-spacing: 3px;
		text-shadow: 1px 2px 4px rgba(0,0,0,0.7);
	}

	/* ── Footer pills ── */
	.footer-bar {
	position: absolute;
	bottom: 6%;
	width: 100%;
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 2vh;
}
.footer-item {
	display: flex;
	align-items: center;
	gap: 0.8vh;

	font-family: 'Montserrat', Arial, sans-serif;
	font-size: 2.2vh;
	font-weight: 600;

	color: #ffffff;
}
.icon {
	color: #f4b223;
	font-size: 2.2vh;
}
.separator {
	width: 2px;
	height: 3vh;
	background: rgba(255,255,255,0.4);
}
.highlight {
	background: #f4b223;
	color: #000;

	padding: 0.6vh 1.8vh;
	border-radius: 0.8vh;

	font-weight: 700;
}
	.footer-pills {
		position: absolute;
		bottom: 5%;
		width: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 1.5vh;
	}
	.pill {
		display: flex;
		align-items: center;
		gap: 0.8vh;
		padding: 1.2vh 2.5vh;
		border-radius: 1.2vh;
		font-family: 'Bebas Neue', 'Oswald', Arial, sans-serif;
		font-size: 2vh;
		font-weight: 400;
		letter-spacing: 1.5px;
	}
	.pill-dark {
		background: rgba(30,30,30,0.7);
		color: #FFFFFF;
		border: 1.5px solid rgba(233,164,21,0.5);
	}
	.pill-gold {
		background: #E9A415;
		color: #1A1A1A;
	}
	.pill-sep {
		width: 1.5px;
		height: 3.5vh;
		background: rgba(255,255,255,0.3);
	}
	.pill-icon {
		font-size: 1.8vh;
		opacity: 0.9;
	}
</style>
</head>
<body>
	<div class="container">
		<div class="top-vignette"></div>
		<div class="bottom-gradient"></div>
		<div class="content">
			<div class="headline" style="--headline-font-size: {{headlineFontSize}}">{{headline}}</div>

			<div class="info-block">
				<div class="starting-line">
					<div class="dash"></div>
					<div class="starting-text">STARTING FROM</div>
					<div class="dash"></div>
				</div>
				<div class="price-line">
					<span class="currency">{{currency}}</span>
					<span class="amount">{{amount}}</span>
				</div>
				<div class="inc-header">
					<div class="inc-dec-line"></div>
					<div class="inc-label">Includes</div>
					<div class="inc-dec-line"></div>
				</div>
				<div class="inc-items">{{includes}}</div>
			</div>

			<!-- <div class="footer-pills">
				<div class="pill pill-dark">
					<span class="pill-icon">&#128197;</span>
					<span>{{dates}}</span>
				</div>
				<div class="pill-sep"></div>
				<div class="pill pill-gold">{{duration}}</div>
				<div class="pill-sep"></div>
				<div class="pill pill-dark">
					<span class="pill-icon">&#9742;</span>
					<span>{{contact}}</span>
				</div>
			</div> -->
		<div class="footer-bar">
	<div class="footer-item">
		<span class="icon">&#128197;</span>
		<span>{{dates}}</span>
	</div>

	<div class="separator"></div>

	<div class="footer-item highlight">
		{{duration}}
	</div>

	<div class="separator"></div>

	<div class="footer-item">
		<span class="icon">&#9742;</span>
		<span>{{contact}}</span>
	</div>
</div>
		</div>
	</div>
</body>
</html>
