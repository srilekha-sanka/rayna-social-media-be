<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;600;700;900&family=Kaushan+Script&display=swap"
		rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: var(--viewport-width);
			height: var(--viewport-height);
			overflow: hidden;
			background: transparent;
			font-family: 'Montserrat', sans-serif;
		}

		.wrap {
			width: 100%;
			height: 100%;
			position: relative;
		}

		/* Dramatic adventure gradient — strong top + strong bottom */
		.grad {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(180deg,
					rgba(0, 0, 0, 0.7) 0%,
					rgba(0, 0, 0, 0.1) 25%,
					rgba(0, 0, 0, 0) 45%,
					rgba(0, 0, 0, 0.55) 65%,
					rgba(10, 6, 0, 0.97) 100%);
		}

		/* Side warmth */
		.grad-side {
			position: absolute;
			inset: 0;
			background: linear-gradient(90deg, rgba(0, 0, 0, 0.3) 0%, transparent 60%, rgba(0, 0, 0, 0.15) 100%);
		}

		.layer {
			position: absolute;
			inset: 0;
		}

		/* ── Top area: brand + category ── */
		.top-area {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			padding: clamp(14px, 3vw, 40px) clamp(16px, 4vw, 48px);
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
		}

		.brand {
			font-size: clamp(9px, 1.2vw, 16px);
			font-weight: 800;
			letter-spacing: 3px;
			color: #fff;
			text-transform: uppercase;
			text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
		}

		.brand span {
			color: #F5A623;
		}

		.cat-label {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 600;
			letter-spacing: 2px;
			color: rgba(255, 255, 255, 0.6);
			text-transform: uppercase;
			background: rgba(255, 255, 255, 0.1);
			border: 1px solid rgba(255, 255, 255, 0.15);
			padding: 4px 12px;
			border-radius: 100px;
		}

		/* ── Central hero: BIG brush script headline ── */
		.hero-center {
			position: absolute;
			top: 50%;
			left: 0;
			right: 0;
			transform: translateY(-60%);
			text-align: center;
			padding: 0 5%;
		}

		.script-name {
			font-family: 'Kaushan Script', cursive;
			font-size: clamp(36px, 12vw, 160px);
			font-weight: 400;
			color: #fff;
			line-height: 1;
			text-shadow:
				0 0 40px rgba(245, 166, 35, 0.5),
				0 4px 30px rgba(0, 0, 0, 0.8),
				0 8px 60px rgba(0, 0, 0, 0.6);
			letter-spacing: 1px;
		}

		.divider-line {
			margin: clamp(8px, 1.5vh, 18px) auto;
			width: clamp(40px, 8vw, 100px);
			height: 2px;
			background: linear-gradient(90deg, transparent, #F5A623, transparent);
		}

		.sub-label {
			font-size: clamp(9px, 1.3vw, 18px);
			font-weight: 300;
			letter-spacing: 6px;
			color: rgba(255, 255, 255, 0.75);
			text-transform: uppercase;
		}

		/* ── Price badge ── */
		.price-badge {
			position: absolute;
			bottom: clamp(90px, 16vh, 180px);
			right: clamp(16px, 4vw, 50px);
			text-align: right;
		}

		.from-text {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 600;
			letter-spacing: 3px;
			color: #fff;
			text-transform: uppercase;
			text-shadow: 0 1px 2px rgba(0,0,0,0.6);
		}

		.price-num {
			font-family: 'Playfair Display', serif;
			font-size: clamp(24px, 5vw, 70px);
			font-weight: 900;
			color: #F5A623;
			line-height: 1;
			text-shadow: 0 4px 20px rgba(245, 166, 35, 0.4);
		}

		/* ── Bottom strip ── */
		.bottom-strip {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			background: rgba(8, 5, 0, 0.85);
			backdrop-filter: blur(16px);
			border-top: 2px solid #F5A623;
			padding: clamp(10px, 2vh, 22px) clamp(16px, 4vw, 50px);
			display: flex;
			align-items: center;
			gap: clamp(10px, 2vw, 30px);
		}

		.inc-label {
			font-size: clamp(7px, 0.9vw, 12px);
			font-weight: 700;
			color: #F5A623;
			letter-spacing: 2px;
			text-transform: uppercase;
			white-space: nowrap;
			flex-shrink: 0;
		}

		.inc-items {
			font-size: clamp(8px, 1.1vw, 15px);
			font-weight: 400;
			color: rgba(255, 255, 255, 0.8);
			letter-spacing: 1.5px;
		}

		.dates-right {
			margin-left: auto;
			font-size: clamp(8px, 1vw, 14px);
			font-weight: 700;
			letter-spacing: 2px;
			color: #fff;
			white-space: nowrap;
			flex-shrink: 0;
			text-shadow: 0 1px 2px rgba(0,0,0,0.6);
		}

		/* ── Landscape Optimizations (1.91:1) ── */
		@media (min-aspect-ratio: 1.2/1) {
			.hero-center {
				transform: translateY(-70%);
			}
			.script-name {
				font-size: clamp(40px, 9vw, 110px);
			}
			.sub-label {
				font-size: clamp(9px, 1.4vw, 20px);
			}
			.price-badge {
				bottom: clamp(60px, 12vh, 100px);
			}
			.price-num {
				font-size: clamp(20px, 4vw, 45px);
			}
			.bottom-strip {
				padding: clamp(8px, 1.5vh, 16px) clamp(16px, 4vw, 50px);
			}
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="grad"></div>
		<div class="grad-side"></div>
		<div class="layer">
			<div class="top-area">
				<div class="brand">RAYNA <span>TOURS</span></div>
				<div class="cat-label">{{category}}</div>
			</div>

			<div class="hero-center">
				<div class="script-name">{{headline}}</div>
				<div class="divider-line"></div>
				<div class="sub-label">{{subheadline}}</div>
			</div>

			<div class="price-badge">
				<div class="from-text">Starting From</div>
				<div class="price-num">{{price}}</div>
			</div>

			<div class="bottom-strip">
				<div class="inc-label">Includes ›</div>
				<div class="inc-items">{{includes}}</div>
				<div class="dates-right">{{dates}}</div>
			</div>
		</div>
	</div>
</body>

</html>
